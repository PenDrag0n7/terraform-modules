mode: ContinuousDeployment
branches:
  main:
    regex: ^master$|^main$
    label: ''
    increment: Minor
    prevent-increment:
      of-merged-branch: false
    is-source-branch-for: [ 'dev' ,'feature', 'release' ]
    is-main-branch: true
    is-release-branch: false
  release:
    regex: ^release?[/-]
    source-branches: [ 'main' ]
    increment: Major
    label: ''
    prevent-increment:
      of-merged-branch: false
    is-release-branch: true
    is-main-branch: false
  feature:
    regex: feature?[/-]
    increment: Patch
    label: ''
    prevent-increment:
      of-merged-branch: false
    is-main-branch: false
    is-release-branch: false
  dev:
    regex: ^dev(elop)?(ment)?$
    mode: ContinuousDeployment
    label: alpha
    increment: Minor
    prevent-increment:
      of-merged-branch: false
      when-current-commit-tagged: false
    track-merge-target: true
    source-branches: []
    tracks-release-branches: true
    is-release-branch: false
    is-main-branch: false
    pre-release-weight: 0